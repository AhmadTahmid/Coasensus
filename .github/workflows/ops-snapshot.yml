name: Ops Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "11 * * * *"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Ops Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COASENSUS_BASE_URL_PROD: "https://coasensus.com"
          COASENSUS_BASE_URL_STAGING: "https://staging.coasensus.com"
          COASENSUS_ADMIN_TOKEN_PROD: ${{ secrets.COASENSUS_ADMIN_REFRESH_TOKEN_PROD }}
          COASENSUS_ADMIN_TOKEN_STAGING: ${{ secrets.COASENSUS_ADMIN_REFRESH_TOKEN_STAGING }}
          COASENSUS_MAX_STALE_MINUTES_PROD: "90"
          COASENSUS_MAX_STALE_MINUTES_STAGING: "120"
          COASENSUS_LLM_SUCCESS_RATE_MIN: "0.70"
          COASENSUS_CATEGORY_DOMINANCE_MAX_SHARE: "0.90"
          COASENSUS_DASHBOARD_TOP_N: "20"
          COASENSUS_MONITOR_PRODUCTION_MAX_AGE_HOURS: "2"
          COASENSUS_MONITOR_STAGING_MAX_AGE_HOURS: "3"
          COASENSUS_LAUNCH_STABILITY_MAX_AGE_HOURS: "3"
          COASENSUS_EDITORIAL_MAX_AGE_HOURS: "36"
        run: node scripts/ops-snapshot.mjs

      - name: Upload Ops Snapshot Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-snapshot-${{ github.run_id }}
          path: artifacts/ops-snapshot.*
          if-no-files-found: error

      - name: Route Ops Alerts
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COASENSUS_OPS_SNAPSHOT_PATH: artifacts/ops-snapshot.json
          COASENSUS_OPS_ALERT_LABEL: ops-alert
          COASENSUS_OPS_ALERT_TITLE: "[Ops Snapshot] Active Incident"
        run: node scripts/ops-alert-routing.mjs
